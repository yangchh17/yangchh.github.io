<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Map Review Tool</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            color: #333;
        }
        
        .header {
            background: #2c3e50;
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header h1 {
            font-size: 1.5rem;
            font-weight: 600;
        }
        
        .header-actions {
            display: flex;
            gap: 0.5rem;
        }
        
        .btn {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        
        .btn-primary {
            background: #3498db;
            color: white;
        }
        
        .btn-primary:hover {
            background: #2980b9;
        }
        
        .btn-secondary {
            background: #95a5a6;
            color: white;
        }
        
        .btn-secondary:hover {
            background: #7f8c8d;
        }
        
        .btn-success {
            background: #27ae60;
            color: white;
        }
        
        .btn-success:hover {
            background: #229954;
        }
        
        .tabs {
            background: white;
            border-bottom: 2px solid #ddd;
            padding: 0 2rem;
            display: flex;
            gap: 0.5rem;
            overflow-x: auto;
        }
        
        .tab {
            padding: 1rem 1.5rem;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.2s;
            white-space: nowrap;
        }
        
        .tab:hover {
            background: #f8f9fa;
        }
        
        .tab.active {
            border-bottom-color: #3498db;
            color: #3498db;
            font-weight: 600;
        }
        
        .tab-close {
            margin-left: 0.5rem;
            color: #e74c3c;
            font-weight: bold;
        }
        
        .content {
            padding: 2rem;
        }
        
        .project-content {
            display: none;
        }
        
        .project-content.active {
            display: block;
        }
        
        .map-tabs {
            background: #ecf0f1;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            margin-bottom: 1rem;
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        
        .map-tab {
            padding: 0.5rem 1rem;
            background: white;
            border: 1px solid #ddd;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .map-tab:hover {
            background: #f8f9fa;
        }
        
        .map-tab.active {
            background: #3498db;
            color: white;
            border-color: #3498db;
        }
        
        .map-content {
            display: none;
        }
        
        .map-content.active {
            display: flex;
            gap: 1rem;
            background: white;
            border-radius: 8px;
            padding: 1.5rem;
            min-height: 600px;
        }
        
        .map-viewer {
            flex: 0 0 70%;
            border: 1px solid #ddd;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
        }
        
        .map-viewer-header {
            padding: 1rem;
            border-bottom: 1px solid #ddd;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .map-viewer-body {
            flex: 1;
            overflow: auto;
            padding: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fafafa;
        }
        
        .map-viewer-body img,
        .map-viewer-body embed {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        
        .map-viewer-footer {
            padding: 1rem;
            border-top: 1px solid #ddd;
            background: #f8f9fa;
        }
        
        .version-timeline {
            display: flex;
            gap: 0.5rem;
            overflow-x: auto;
            padding: 0.5rem 0;
        }
        
        .version-item {
            flex: 0 0 auto;
            padding: 0.5rem 1rem;
            background: white;
            border: 2px solid #ddd;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            min-width: 100px;
        }
        
        .version-item:hover {
            border-color: #3498db;
        }
        
        .version-item.active {
            background: #3498db;
            color: white;
            border-color: #3498db;
        }
        
        .version-label {
            font-size: 0.9rem;
            font-weight: 600;
        }
        
        .version-date {
            font-size: 0.75rem;
            opacity: 0.8;
            margin-top: 0.25rem;
        }
        
        .comments-panel {
            flex: 0 0 30%;
            border: 1px solid #ddd;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .comments-header {
            padding: 1rem;
            border-bottom: 1px solid #ddd;
            background: #f8f9fa;
            font-weight: 600;
        }
        
        .comments-body {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
        }
        
        .review-round {
            margin-bottom: 1.5rem;
            padding: 1rem;
            background: #f8f9fa;
            border-radius: 4px;
            border-left: 4px solid #3498db;
        }
        
        .review-round.round-1 {
            border-left-color: #e74c3c;
        }
        
        .review-round.round-2 {
            border-left-color: #f39c12;
        }
        
        .review-round.round-3 {
            border-left-color: #27ae60;
        }
        
        .round-header {
            font-weight: 600;
            margin-bottom: 0.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .round-date {
            font-size: 0.85rem;
            color: #7f8c8d;
            font-weight: normal;
        }
        
        .comment-input {
            width: 100%;
            min-height: 80px;
            padding: 0.5rem;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-family: inherit;
            font-size: 0.9rem;
            resize: vertical;
        }
        
        .comment-text {
            font-size: 0.9rem;
            line-height: 1.5;
            white-space: pre-wrap;
        }
        
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: #95a5a6;
        }
        
        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        
        .upload-zone {
            border: 2px dashed #ddd;
            border-radius: 4px;
            padding: 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .upload-zone:hover {
            border-color: #3498db;
            background: #f8f9fa;
        }
        
        .upload-zone.dragover {
            border-color: #3498db;
            background: #e3f2fd;
        }
        
        input[type="file"] {
            display: none;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: white;
            border-radius: 8px;
            padding: 2rem;
            max-width: 500px;
            width: 90%;
        }
        
        .modal-header {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }
        
        .modal-body {
            margin-bottom: 1.5rem;
        }
        
        .modal-footer {
            display: flex;
            gap: 0.5rem;
            justify-content: flex-end;
        }
        
        .form-group {
            margin-bottom: 1rem;
        }
        
        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }
        
        .form-input {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Map Review Tool</h1>
        <div class="header-actions">
            <button class="btn btn-secondary" onclick="importData()">Import</button>
            <button class="btn btn-success" onclick="exportData()">Export</button>
            <button class="btn btn-primary" onclick="addProject()">+ Project</button>
        </div>
    </div>
    
    <div class="tabs" id="projectTabs"></div>
    
    <div class="content" id="content"></div>
    
    <!-- Add Project Modal -->
    <div class="modal" id="addProjectModal">
        <div class="modal-content">
            <div class="modal-header">Add New Project</div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label">Project Name</label>
                    <input type="text" class="form-input" id="projectNameInput" placeholder="e.g., GFNPRO107">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('addProjectModal')">Cancel</button>
                <button class="btn btn-primary" onclick="confirmAddProject()">Add</button>
            </div>
        </div>
    </div>
    
    <!-- Add Map Type Modal -->
    <div class="modal" id="addMapModal">
        <div class="modal-content">
            <div class="modal-header">Add Map Type</div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label">Map Type</label>
                    <input type="text" class="form-input" id="mapTypeInput" placeholder="e.g., Overview, Buildings, Roads">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('addMapModal')">Cancel</button>
                <button class="btn btn-primary" onclick="confirmAddMap()">Add</button>
            </div>
        </div>
    </div>

    <script>
        // Data structure
        let appData = {
            projects: []
        };
        
        let currentProject = null;
        let currentMap = null;
        
        // Initialize
        function init() {
            loadFromLocalStorage();
            render();
        }
        
        // Render UI
        function render() {
            renderProjectTabs();
            renderContent();
        }
        
        function renderProjectTabs() {
            const tabsContainer = document.getElementById('projectTabs');
            tabsContainer.innerHTML = '';
            
            appData.projects.forEach((project, index) => {
                const tab = document.createElement('div');
                tab.className = 'tab' + (currentProject === index ? ' active' : '');
                tab.innerHTML = `
                    ${project.name}
                    <span class="tab-close" onclick="removeProject(${index}); event.stopPropagation();">×</span>
                `;
                tab.onclick = () => {
                    currentProject = index;
                    currentMap = 0;
                    render();
                };
                tabsContainer.appendChild(tab);
            });
        }
        
        function renderContent() {
            const content = document.getElementById('content');
            content.innerHTML = '';
            
            if (appData.projects.length === 0) {
                content.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📋</div>
                        <h2>No Projects Yet</h2>
                        <p>Click "+ Project" to get started</p>
                    </div>
                `;
                return;
            }
            
            if (currentProject === null) {
                currentProject = 0;
            }
            
            const project = appData.projects[currentProject];
            
            // Map tabs
            const mapTabs = document.createElement('div');
            mapTabs.className = 'map-tabs';
            
            project.maps.forEach((map, index) => {
                const mapTab = document.createElement('div');
                mapTab.className = 'map-tab' + (currentMap === index ? ' active' : '');
                mapTab.textContent = map.name;
                mapTab.onclick = () => {
                    currentMap = index;
                    render();
                };
                mapTabs.appendChild(mapTab);
            });
            
            const addMapBtn = document.createElement('button');
            addMapBtn.className = 'btn btn-primary';
            addMapBtn.textContent = '+ Map Type';
            addMapBtn.onclick = () => openModal('addMapModal');
            mapTabs.appendChild(addMapBtn);
            
            content.appendChild(mapTabs);
            
            // Map content
            if (project.maps.length === 0) {
                content.innerHTML += `
                    <div class="empty-state">
                        <div class="empty-state-icon">🗺️</div>
                        <h3>No Map Types</h3>
                        <p>Add a map type to start reviewing</p>
                    </div>
                `;
                return;
            }
            
            if (currentMap === null) {
                currentMap = 0;
            }
            
            const map = project.maps[currentMap];
            
            const mapContent = document.createElement('div');
            mapContent.className = 'map-content active';
            
            // Map viewer
            const mapViewer = document.createElement('div');
            mapViewer.className = 'map-viewer';
            
            const viewerHeader = document.createElement('div');
            viewerHeader.className = 'map-viewer-header';
            viewerHeader.innerHTML = `
                <h3>${map.name}</h3>
                <input type="file" id="fileInput-${currentProject}-${currentMap}" accept=".pdf,image/*" onchange="handleFileUpload(event)">
                <button class="btn btn-primary" onclick="document.getElementById('fileInput-${currentProject}-${currentMap}').click()">
                    Upload Version
                </button>
            `;
            
            const viewerBody = document.createElement('div');
            viewerBody.className = 'map-viewer-body';
            viewerBody.id = 'mapViewerBody';
            
            if (map.versions.length === 0) {
                viewerBody.innerHTML = `
                    <div class="upload-zone" onclick="document.getElementById('fileInput-${currentProject}-${currentMap}').click()">
                        <div style="font-size: 2rem; margin-bottom: 1rem;">📤</div>
                        <div>Click to upload or drag & drop</div>
                        <div style="font-size: 0.85rem; color: #95a5a6; margin-top: 0.5rem;">PDF or Image files</div>
                    </div>
                `;
            } else {
                const currentVersion = map.currentVersion || 0;
                const version = map.versions[currentVersion];
                if (version.type === 'pdf') {
                    viewerBody.innerHTML = `<embed src="${version.data}" type="application/pdf" width="100%" height="100%">`;
                } else {
                    viewerBody.innerHTML = `<img src="${version.data}" alt="Map">`;
                }
            }
            
            const viewerFooter = document.createElement('div');
            viewerFooter.className = 'map-viewer-footer';
            
            const timeline = document.createElement('div');
            timeline.className = 'version-timeline';
            
            map.versions.forEach((version, index) => {
                const versionItem = document.createElement('div');
                versionItem.className = 'version-item' + (map.currentVersion === index ? ' active' : '');
                versionItem.innerHTML = `
                    <div class="version-label">V${index + 1}</div>
                    <div class="version-date">${version.date}</div>
                `;
                versionItem.onclick = () => {
                    map.currentVersion = index;
                    render();
                };
                timeline.appendChild(versionItem);
            });
            
            viewerFooter.appendChild(timeline);
            
            mapViewer.appendChild(viewerHeader);
            mapViewer.appendChild(viewerBody);
            mapViewer.appendChild(viewerFooter);
            
            // Comments panel
            const commentsPanel = document.createElement('div');
            commentsPanel.className = 'comments-panel';
            
            const commentsHeader = document.createElement('div');
            commentsHeader.className = 'comments-header';
            commentsHeader.textContent = 'Review Comments';
            
            const commentsBody = document.createElement('div');
            commentsBody.className = 'comments-body';
            commentsBody.id = 'commentsBody';
            
            for (let i = 0; i < 3; i++) {
                const round = map.reviews[i] || { comments: '', date: '' };
                const roundDiv = document.createElement('div');
                roundDiv.className = `review-round round-${i + 1}`;
                roundDiv.innerHTML = `
                    <div class="round-header">
                        <span>Round ${i + 1}</span>
                        <span class="round-date">${round.date || ''}</span>
                    </div>
                    <textarea class="comment-input" 
                              placeholder="Enter review comments..." 
                              onchange="updateComment(${i}, this.value)">${round.comments || ''}</textarea>
                `;
                commentsBody.appendChild(roundDiv);
            }
            
            commentsPanel.appendChild(commentsHeader);
            commentsPanel.appendChild(commentsBody);
            
            mapContent.appendChild(mapViewer);
            mapContent.appendChild(commentsPanel);
            
            content.appendChild(mapContent);
        }
        
        // Project management
        function addProject() {
            openModal('addProjectModal');
        }
        
        function confirmAddProject() {
            const name = document.getElementById('projectNameInput').value.trim();
            if (!name) {
                alert('Please enter a project name');
                return;
            }
            
            appData.projects.push({
                name: name,
                maps: []
            });
            
            currentProject = appData.projects.length - 1;
            currentMap = null;
            
            document.getElementById('projectNameInput').value = '';
            closeModal('addProjectModal');
            saveToLocalStorage();
            render();
        }
        
        function removeProject(index) {
            if (confirm('Remove this project?')) {
                appData.projects.splice(index, 1);
                if (currentProject >= appData.projects.length) {
                    currentProject = appData.projects.length - 1;
                }
                saveToLocalStorage();
                render();
            }
        }
        
        // Map management
        function confirmAddMap() {
            const name = document.getElementById('mapTypeInput').value.trim();
            if (!name) {
                alert('Please enter a map type');
                return;
            }
            
            const project = appData.projects[currentProject];
            project.maps.push({
                name: name,
                versions: [],
                reviews: [{}, {}, {}],
                currentVersion: 0
            });
            
            currentMap = project.maps.length - 1;
            
            document.getElementById('mapTypeInput').value = '';
            closeModal('addMapModal');
            saveToLocalStorage();
            render();
        }
        
        // File upload
        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                const project = appData.projects[currentProject];
                const map = project.maps[currentMap];
                
                const version = {
                    data: e.target.result,
                    type: file.type.includes('pdf') ? 'pdf' : 'image',
                    date: new Date().toLocaleDateString(),
                    filename: file.name
                };
                
                map.versions.push(version);
                map.currentVersion = map.versions.length - 1;
                
                saveToLocalStorage();
                render();
            };
            
            reader.readAsDataURL(file);
        }
        
        // Comment management
        function updateComment(roundIndex, value) {
            const project = appData.projects[currentProject];
            const map = project.maps[currentMap];
            
            if (!map.reviews[roundIndex]) {
                map.reviews[roundIndex] = {};
            }
            
            map.reviews[roundIndex].comments = value;
            map.reviews[roundIndex].date = new Date().toLocaleDateString();
            
            saveToLocalStorage();
        }
        
        // Modal management
        function openModal(modalId) {
            document.getElementById(modalId).classList.add('active');
        }
        
        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }
        
        // Data persistence
        function saveToLocalStorage() {
            localStorage.setItem('mapReviewData', JSON.stringify(appData));
        }
        
        function loadFromLocalStorage() {
            const saved = localStorage.getItem('mapReviewData');
            if (saved) {
                appData = JSON.parse(saved);
            }
        }
        
        function exportData() {
            const dataStr = JSON.stringify(appData, null, 2);
            const dataBlob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(dataBlob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `map-review-${Date.now()}.json`;
            link.click();
            URL.revokeObjectURL(url);
        }
        
        function importData() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = function(e) {
                const file = e.target.files[0];
                if (!file) return;
                
                const reader = new FileReader();
                reader.onload = function(event) {
                    try {
                        appData = JSON.parse(event.target.result);
                        currentProject = 0;
                        currentMap = 0;
                        saveToLocalStorage();
                        render();
                        alert('Data imported successfully!');
                    } catch (error) {
                        alert('Error importing data: ' + error.message);
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        }
        
        // Initialize on load
        init();
    </script>
</body>
</html>
